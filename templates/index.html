<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Quality Monitoring System</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>

<body>

<header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container-fluid">

        <a class="navbar-brand" href="/">
        AI-Assisted Data Quality Monitoring
        </a>

        <div class="navbar-nav">

        <a class="nav-link active" href="/">Dashboard</a>

        <a class="nav-link" href="/upload">Upload Dataset</a>

        </div>

        </div>

    </nav>

</header>

<div class="container mt-4">

    <section>

<h2 class="mb-4">Dashboard</h2>



<div id="dashboard-cards">

<div class="row mb-4">

<div class="col-lg col-md-6 mb-3">

<div class="card shadow-sm text-center">

<div class="card-body">

<h6>Total Datasets</h6>

<h2 id="total-datasets">0</h2>

</div>

</div>

</div>

<div class="col-md">

<div class="card shadow-sm text-center">

<div class="card-body">

<h6>Low Risk</h6>

<h2 id="low-risk">0</h2>

</div>

</div>

</div>

<div class="col-md">

<div class="card shadow-sm text-center">

<div class="card-body">

<h6>Medium Risk</h6>

<h2 id="medium-risk">0</h2>

</div>

</div>

</div>

<div class="col-md">

<div class="card shadow-sm text-center">

<div class="card-body">

<h6>High Risk</h6>

<h2 id="high-risk">0</h2>

</div>

</div>

</div>

<div class="col-md">

<div class="card shadow-sm text-center">

<div class="card-body">

<h6>Average Quality</h6>

<h2 id="avg-quality">0%</h2>

</div>

</div>

</div>

</div>


<section>

    <h2>Search & Filter</h2>

    <div class="row g-3 mb-4">

<div class="col-md-4">

<input
class="form-control"
type="text"
id="search"
placeholder="Search datasets..."
>

</div>

<div class="col-md-2">

<select
class="form-select"
id="risk">

<option value="">All Risks</option>

<option>Low</option>

<option>Medium</option>

<option>High</option>

</select>

</div>

<div class="col-md-2">

<select
class="form-select"
id="sort">

<option value="">Sort By</option>

<option value="dataset_name">Dataset Name</option>

<option value="organisation">Organisation</option>

<option value="quality_score">Quality Score</option>

<option value="upload_date">Upload Date</option>

</select>

</div>

<div class="col-md-2">

<select
class="form-select"
id="order">

<option value="asc">Ascending</option>

<option value="desc">Descending</option>

</select>

</div>

<div class="col-md-2">

<button
class="btn btn-primary w-100"
id="apply">

Apply

</button>

</div>

</div>
    </section>

    <section>

        <h2>Datasets</h2>

        <div class="table-responsive">

            <table
            id="datasets-table"
            class="table table-striped table-hover align-middle">

            <thead>

                <tr>

                <th>ID</th>

                <th>Dataset</th>

                <th>Organisation</th>

                <th>Rows</th>

                <th>Columns</th>

                <th>Quality</th>

                <th>Risk</th>

                </tr>

                </thead>

                <tbody id="datasets-body">

                </tbody>

        </table>
            </div>

    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
