<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Upload Dataset</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">

            AI-Assisted Data Quality Monitoring

        </a>

        <div class="navbar-nav ms-auto">

            <a class="nav-link" href="/">Dashboard</a>

            <a class="nav-link active" href="/upload">Upload Dataset</a>

            {% if username %}

            <span class="navbar-text me-3">

                👤 {{ username }}

            </span>

            <a class="nav-link" href="/logout">

                Logout

            </a>

            {% else %}

            <a class="nav-link" href="/login">

                Login

            </a>

            {% endif %}

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="mb-4">

                        Upload Dataset

                    </h2>

                    <form
                        id="upload-form"
                        action="/datasets"
                        method="POST"
                        enctype="multipart/form-data">

                        <div class="mb-3">

                            <label class="form-label">

                                Dataset Name

                            </label>

                            <input
                                class="form-control"
                                type="text"
                                name="dataset_name"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Organisation

                            </label>

                            <input
                                class="form-control"
                                type="text"
                                name="organisation"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Source System

                            </label>

                            <input
                                class="form-control"
                                type="text"
                                name="source_system">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Domain

                            </label>

                            <input
                                class="form-control"
                                type="text"
                                name="domain">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Uploaded By

                            </label>

                            <input
                                class="form-control"
                                type="text"
                                name="uploaded_by"
                                {% if username %}
                                value="{{ username }}"
                                readonly
                                {% endif %}>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Notes

                            </label>

                            <textarea
                                class="form-control"
                                rows="4"
                                name="notes"></textarea>

                        </div>

                        {% if username %}

                        <div class="mb-3">

                            <label class="form-label">

                                Dataset Visibility

                            </label>

                            <div class="form-check">

                                <input
                                    class="form-check-input"
                                    type="radio"
                                    name="visibility"
                                    id="public"
                                    value="public"
                                    checked>

                                <label class="form-check-label" for="public">

                                    Public

                                </label>

                            </div>

                            <div class="form-check">

                                <input
                                    class="form-check-input"
                                    type="radio"
                                    name="visibility"
                                    id="private"
                                    value="private">

                                <label class="form-check-label" for="private">

                                    Private

                                </label>

                            </div>

                        </div>

                        {% endif %}

                        <div class="mb-4">

                            <label class="form-label">

                                Select CSV File

                            </label>

                            <input
                                class="form-control"
                                type="file"
                                name="file"
                                accept=".csv"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success w-100">

                            Upload Dataset

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
